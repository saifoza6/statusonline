<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Node Status | Foza Premium</title>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #030712;
      --card-bg: rgba(17, 24, 39, 0.6);
      --card-hover: rgba(31, 41, 55, 0.7);
      --border: rgba(255, 255, 255, 0.06);
      --border-hover: rgba(99, 102, 241, 0.4);
      --accent: linear-gradient(135deg, #6366f1, #a855f7);
      --text: #f9fafb;
      --text-dim: #9ca3af;
      --success: #10b981;
      --error: #ef4444;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

    body { 
      font-family: 'Plus Jakarta Sans', sans-serif; 
      background: var(--bg);
      background-image: 
        radial-gradient(circle at 100% 0%, rgba(99, 102, 241, 0.15) 0%, transparent 40%),
        radial-gradient(circle at 0% 100%, rgba(168, 85, 247, 0.08) 0%, transparent 40%);
      color: var(--text); 
      margin: 0; 
      padding: 16px; 
      display: flex; 
      justify-content: center;
      min-height: 100vh;
      overflow-x: hidden;
    }

    .dashboard { width: 100%; max-width: 440px; margin-top: 8vh; }

    .header { text-align: center; margin-bottom: 32px; position: relative; }
    .uptime-label { font-size: 11px; font-weight: 700; color: var(--text-dim); text-transform: uppercase; letter-spacing: 2.5px; opacity: 0.6; }
    .uptime { 
      font-size: 46px; font-weight: 800; 
      background: linear-gradient(to bottom, #ffffff, #9ca3af);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      margin: 4px 0 8px 0; font-variant-numeric: tabular-nums; letter-spacing: -1px;
    }
    .header h1 { font-size: 16px; font-weight: 600; color: #a5b4fc; letter-spacing: 0.5px; opacity: 0.9; }

    .node-card { 
      background: var(--card-bg); border: 1px solid var(--border);
      backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
      border-radius: 22px; padding: 18px 20px; margin-bottom: 12px; 
      display: flex; justify-content: space-between; align-items: center; 
      transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
      box-shadow: 0 4px 30px rgba(0, 0, 0, 0.2); cursor: pointer;
    }
    @media (hover: hover) {
      .node-card:hover { 
        transform: translateY(-2px); background: var(--card-hover);
        border-color: var(--border-hover); box-shadow: 0 12px 30px rgba(99, 102, 241, 0.1);
      }
    }
    .node-card:active { transform: scale(0.97); opacity: 0.8; }

    .node-title-wrapper { display: flex; align-items: center; gap: 12px; }
    .node-info { font-weight: 600; font-size: 15px; letter-spacing: -0.2px; }
    .ping-wrapper { display: flex; align-items: center; gap: 4px; margin-top: 4px; color: var(--text-dim); font-size: 12px; }
    .ping-icon { width: 12px; height: 12px; opacity: 0.5; }

    .badge-container { display: flex; align-items: center; gap: 8px; }
    .badge { 
      font-size: 11px; font-weight: 700; padding: 6px 14px; border-radius: 50px; 
      display: flex; align-items: center; gap: 6px; letter-spacing: 0.3px;
    }
    .online { color: var(--success); background: rgba(16, 185, 129, 0.06); border: 1px solid rgba(16, 185, 129, 0.15); }
    .offline { color: var(--error); background: rgba(239, 68, 68, 0.06); border: 1px solid rgba(239, 68, 68, 0.15); }
    
    .pulse-dot { width: 6px; height: 6px; border-radius: 50%; }
    .online .pulse-dot { background: var(--success); box-shadow: 0 0 8px var(--success); animation: pulse 2s infinite; }
    .offline .pulse-dot { background: var(--error); }

    @keyframes pulse {
      0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(16, 185, 129, 0.5); }
      70% { transform: scale(1); box-shadow: 0 0 0 6px rgba(16, 185, 129, 0); }
      100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(16, 185, 129, 0); }
    }

    .modal-overlay {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(2, 6, 23, 0.6); backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
      z-index: 99; opacity: 0; visibility: hidden; transition: all 0.3s ease;
    }
    .modal-overlay.active { opacity: 1; visibility: visible; }

    .modal-box { 
      position: fixed; top: 50%; left: 50%; transform: translate(-50%, -45%) scale(0.95); 
      width: 90%; max-width: 400px; background: #0b0f19; border: 1px solid rgba(255, 255, 255, 0.08);
      padding: 24px; border-radius: 24px; transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1); 
      z-index: 100; opacity: 0; visibility: hidden; box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.8);
    }
    .modal-box.active { transform: translate(-50%, -50%) scale(1); opacity: 1; visibility: visible; }
    
    .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
    .btn-close { background: transparent; border: none; color: var(--text-dim); font-size: 26px; line-height: 1; cursor: pointer; transition: 0.2s; }
    .btn-close:hover { color: var(--error); }
    
    .modal-msg { font-size: 13px; color: #f59e0b; margin-bottom: 16px; font-weight: 600; display: flex; align-items: center; gap: 6px; }
    
    .config-box { 
      background: #030712; padding: 16px; border-radius: 16px; 
      font-family: 'Courier New', monospace; font-size: 12px; 
      color: #818cf8; word-break: break-all; margin-bottom: 20px; 
      border: 1px solid rgba(255,255,255,0.04); max-height: 110px; overflow-y: auto;
    }
    
    .btn-action { 
      width: 100%; padding: 14px; border-radius: 14px; border: none; 
      background: var(--accent); color: #fff; font-weight: 700; font-size: 14px;
      cursor: pointer; transition: all 0.2s; box-shadow: 0 4px 20px rgba(99, 102, 241, 0.2);
    }
    .btn-action:active { transform: scale(0.98); opacity: 0.9; }

    .toast {
      position: fixed; bottom: -60px; left: 50%; transform: translateX(-50%);
      background: #10b981; color: white; padding: 12px 28px;
      border-radius: 50px; font-size: 14px; font-weight: 700;
      box-shadow: 0 10px 25px rgba(16, 185, 129, 0.3);
      transition: bottom 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      z-index: 101; display: flex; align-items: center; gap: 8px;
    }
    .toast.show { bottom: 32px; }
    
    .footer { text-align: center; margin-top: 24px; font-size: 11px; color: var(--text-dim); opacity: 0.5; font-variant-numeric: tabular-nums; }
  </style>
</head>
<body>

  <div class="dashboard">
    <div class="header">
      <div class="uptime-label">System Live Uptime</div>
      <div class="uptime" id="uptime">00:00:00</div>
      <h1>Xray Node Status Monitor</h1>
    </div>
    <div id="server-container"></div>
    <div class="footer" id="time-footer">Syncing network nodes...</div>
  </div>

  <div class="modal-overlay" id="modalOverlay" onclick="closeModal()"></div>
  <div class="modal-box" id="configModal">
    <div class="modal-header">
      <div id="modalTitle" style="font-weight:800; font-size:18px; letter-spacing: -0.3px;">Server Config</div>
      <button class="btn-close" onclick="closeModal()">&times;</button>
    </div>
    <div class="modal-msg">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
      Gunakan NekoBox agar koneksi lancar.
    </div>
    <div class="config-box" id="configText"></div>
    <button class="btn-action" onclick="copyConfig()">SALIN CONFIG VLESS</button>
  </div>

  <div class="toast" id="toast">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><polyline points="20 6 9 17 4 12"/></svg>
    Config berhasil disalin!
  </div>

  <script>
    const servers = [
      { id: "jp", name: "🇯🇵 Worker VPN JP (Rotasi)", url: "https://vpn.foza.biz.id", vless: "vless://673d0bcb-a575-4a91-825c-f3252f8c7e3b@104.18.95.0:2083/?type=ws&security=tls&encryption=none&host=vpn.foza.biz.id&path=%2F#Worker%20VPN%20JP" },
      { id: "sg", name: "🇸🇬 Worker VPN SG (Rotasi)", url: "https://vpn.foza.biz.id", vless: "vless://673d0bcb-a575-4a91-825c-f3252f8c7e3b@172.67.66.234:443/?type=ws&security=tls&encryption=none&host=vpn.foza.biz.id&path=%2F#Worker%20VPN%20SG" },
      { id: "id", name: "🇮🇩 PT Pusat Media Indonesia", url: "https://xray.foza.biz.id", vless: "vless://fc60147e-76b8-4bc5-b691-90b2da79e3d2@104.18.2.1:80/?type=ws&encryption=none&host=xray.foza.biz.id&path=%2F103.6.207.108-8080#PT%20Pusat%20Media" },
      { id: "sg-o", name: "🇸🇬 Oracle Public Cloud SG", url: "https://xray.foza.biz.id", vless: "vless://fc60147e-76b8-4bc5-b691-90b2da79e3d2@172.67.73.39:80/?type=ws&encryption=none&host=xray.foza.biz.id&path=%2F168.138.165.174-443#Oracle%20SG" },
      { id: "sg-a", name: "🇸🇬 Alibaba Cloud SG", url: "https://xray.foza.biz.id", vless: "vless://fc60147e-76b8-4bc5-b691-90b2da79e3d2@172.67.73.39:80/?type=ws&encryption=none&host=xray.foza.biz.id&path=%2F47.74.254.191-8900#Alibaba%20SG" }
    ];

    // --- UPTIME ENGINE GLOBAL (Sama persis di semua browser) ---
    // Waktu mulai server didefinisikan secara baku. Format: "YYYY-MM-DDTHH:MM:SS+07:00" (+07:00 adalah zona waktu WIB).
    // Anda bisa mengubah tanggal "2026-06-20T00:00:00+07:00" di bawah ini ke tanggal Anda pertama kali membuat panel ini.
    const serverStartTime = new Date("2026-06-22T00:00:00+07:00").getTime();

    setInterval(() => {
      const totalSeconds = Math.floor((Date.now() - serverStartTime) / 1000);
      
      // Menggunakan logika absolut agar aman dari angka negatif jika jam komputer pengunjung salah
      const safeSeconds = Math.abs(totalSeconds); 
      
      const h = String(Math.floor(safeSeconds / 3600)).padStart(2, '0');
      const m = String(Math.floor((safeSeconds % 3600) / 60)).padStart(2, '0');
      const s = String(safeSeconds % 60).padStart(2, '0');
      
      document.getElementById('uptime').innerText = `${h}:${m}:${s}`;
    }, 1000);
    // -----------------------------------------------------------

    const container = document.getElementById('server-container');
    servers.forEach((s, i) => {
      container.innerHTML += `
        <div class="node-card" onclick="openModal(${i})">
          <div>
            <div class="node-info">${s.name}</div>
            <div class="ping-wrapper">
              <svg class="ping-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/></svg>
              <span id="p-${s.id}">Pinging...</span>
            </div>
          </div>
          <div class="badge" id="b-${s.id}"><div class="pulse-dot"></div>---</div>
        </div>`;
    });

    async function check() {
      for(const s of servers) {
        const t = Date.now();
        try { 
          await fetch(s.url, { mode: 'no-cors', cache: 'no-store' }); 
          updateUI(s.id, true, Date.now() - t); 
        } catch { 
          updateUI(s.id, false); 
        }
      }
      document.getElementById('time-footer').innerText = "Last update: " + new Date().toLocaleTimeString('id-ID');
    }

    function updateUI(id, up, ping) {
      const b = document.getElementById('b-'+id), p = document.getElementById('p-'+id);
      if(up) {
        b.className = "badge online"; b.innerHTML = '<div class="pulse-dot"></div>ONLINE';
        p.innerText = ping + " ms";
      } else {
        b.className = "badge offline"; b.innerHTML = '<div class="pulse-dot"></div>OFFLINE';
        p.innerText = "Timeout / RTO";
      }
    }

    function openModal(i) {
      document.getElementById('modalTitle').innerText = servers[i].name;
      document.getElementById('configText').innerText = servers[i].vless;
      window.cc = servers[i].vless;
      document.getElementById('modalOverlay').classList.add('active');
      document.getElementById('configModal').classList.add('active');
    }

    function closeModal() {
      document.getElementById('modalOverlay').classList.remove('active');
      document.getElementById('configModal').classList.remove('active');
    }

    function copyConfig() {
      const t = document.createElement("textarea"); t.value = window.cc;
      document.body.appendChild(t); t.select(); document.execCommand('copy'); document.body.removeChild(t);
      
      closeModal();
      
      const toast = document.getElementById('toast');
      toast.classList.add('show');
      setTimeout(() => toast.classList.remove('show'), 2500);
    }
    
    check(); setInterval(check, 4000);
  </script>
</body>
</html>
