<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Node Status | Foza</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-main: #020617;
      --card-bg: rgba(30, 41, 59, 0.45);
      --card-border: rgba(255, 255, 255, 0.08);
      --item-bg: rgba(15, 23, 42, 0.6);
      --item-hover: rgba(30, 41, 59, 0.8);
      --text-primary: #f8fafc;
      --text-secondary: #94a3b8;
      --success: #10b981;
      --error: #ef4444;
      --warning: #f59e0b;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', sans-serif;
      background: radial-gradient(circle at top right, #1e1b4b, var(--bg-main) 40%);
      color: var(--text-primary);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }

    .dashboard {
      width: 100%;
      max-width: 480px;
      background: var(--card-bg);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid var(--card-border);
      border-radius: 24px;
      padding: 32px;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.6), inset 0 1px 0 rgba(255,255,255,0.1);
    }

    .header { text-align: center; margin-bottom: 32px; }
    .header h1 {
      font-size: 26px; font-weight: 700;
      background: linear-gradient(135deg, #60a5fa, #a855f7);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      margin-bottom: 8px;
    }
    .header p { font-size: 14px; color: var(--text-secondary); }

    .node-list { display: flex; flex-direction: column; gap: 14px; }

    .node-card {
      background: var(--item-bg);
      border: 1px solid var(--card-border);
      border-radius: 16px;
      padding: 18px 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      transition: all 0.3s ease;
    }
    .node-card:hover {
      transform: translateY(-4px);
      background: var(--item-hover);
      box-shadow: 0 12px 24px -10px rgba(0, 0, 0, 0.4);
    }

    .node-info { display: flex; flex-direction: column; gap: 6px; }
    .node-name { font-size: 15px; font-weight: 600; }
    .node-meta { font-size: 12px; color: var(--text-secondary); display: flex; align-items: center; gap: 6px; }
    .ping-icon { width: 14px; height: 14px; opacity: 0.7; }

    .status-badge {
      display: flex; align-items: center; gap: 8px;
      padding: 6px 12px; border-radius: 30px;
      font-size: 13px; font-weight: 600; text-transform: uppercase;
    }

    .checking { background: rgba(245, 158, 11, 0.1); border: 1px solid rgba(245, 158, 11, 0.2); color: var(--warning); }
    .online { background: rgba(16, 185, 129, 0.1); border: 1px solid rgba(16, 185, 129, 0.2); color: var(--success); }
    .offline { background: rgba(239, 68, 68, 0.1); border: 1px solid rgba(239, 68, 68, 0.2); color: var(--error); }

    .dot { width: 8px; height: 8px; border-radius: 50%; }
    .dot-checking { background-color: var(--warning); animation: pulse-yellow 1.5s infinite; }
    .dot-online { background-color: var(--success); box-shadow: 0 0 10px var(--success); animation: pulse-green 2s infinite; }
    .dot-offline { background-color: var(--error); }

    @keyframes pulse-green {
      0% { box-shadow: 0 0 0 0 rgba(16, 185, 129, 0.7); }
      70% { box-shadow: 0 0 0 6px rgba(16, 185, 129, 0); }
      100% { box-shadow: 0 0 0 0 rgba(16, 185, 129, 0); }
    }
    @keyframes pulse-yellow {
      0% { opacity: 1; }
      50% { opacity: 0.4; }
      100% { opacity: 1; }
    }

    .footer { margin-top: 32px; text-align: center; font-size: 12px; color: var(--text-secondary); border-top: 1px solid rgba(255,255,255,0.05); padding-top: 20px; }
  </style>
</head>
<body>

  <div class="dashboard">
    <div class="header">
      <h1>Xray Node Status</h1>
      <p>Real-time server monitoring</p>
    </div>
    <div class="node-list" id="server-container">
      </div>
    <div class="footer" id="time-footer">
      Menghubungkan ke server...
    </div>
  </div>

  <script>
    // 1. Daftar URL Server Anda
    const servers = [
      { id: "jp", name: "🇯🇵 VPN JP (Rotasi)", url: "https://vpn.foza.biz.id" },
      { id: "id", name: "🇮🇩 VPN Xray (Statis)", url: "https://xray.foza.biz.id" }
    ];

    const container = document.getElementById('server-container');
    const timeFooter = document.getElementById('time-footer');

    // 2. Fungsi untuk membuat tampilan awal "Checking..."
    function initUI() {
      servers.forEach(server => {
        container.innerHTML += `
          <div class="node-card" id="card-${server.id}">
            <div class="node-info">
              <span class="node-name">${server.name}</span>
              <span class="node-meta" id="ping-${server.id}">
                <svg class="ping-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                Latency: Checking...
              </span>
            </div>
            <div class="status-badge checking" id="badge-${server.id}">
              <div class="dot dot-checking"></div> PINGING
            </div>
          </div>
        `;
      });
    }

    // 3. Fungsi utama mengecek server
    async function checkServers() {
      for (const server of servers) {
        const start = Date.now();
        let isUp = false;

        try {
          // Menggunakan no-cors agar tidak diblokir oleh browser saat ngeping worker
          await fetch(server.url, { mode: 'no-cors', cache: 'no-store' });
          isUp = true;
        } catch (error) {
          isUp = false;
        }

        const ping = Date.now() - start;
        updateUI(server.id, isUp, ping);
      }
      
      const now = new Date();
      timeFooter.innerHTML = "Last updated: " + now.toLocaleString('id-ID', { timeZone: 'Asia/Jakarta' }) + " WIB";
    }

    // 4. Memperbarui HTML setelah hasil ping didapat
    function updateUI(id, isUp, ping) {
      const badge = document.getElementById('badge-' + id);
      const pingText = document.getElementById('ping-' + id);

      if (isUp) {
        badge.className = "status-badge online";
        badge.innerHTML = '<div class="dot dot-online"></div> ONLINE';
        pingText.innerHTML = `<svg class="ping-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"></path></svg> Latency: ${ping} ms`;
      } else {
        badge.className = "status-badge offline";
        badge.innerHTML = '<div class="dot dot-offline"></div> OFFLINE';
        pingText.innerHTML = `<svg class="ping-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg> Latency: Timeout`;
      }
    }

    // 5. Jalankan saat halaman dibuka
    initUI();
    setTimeout(checkServers, 500); // Beri jeda sedikit agar efek loading terlihat
  </script>
</body>
</html>
