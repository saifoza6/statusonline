<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Xray Status | Foza</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root { --bg-main: #020617; --card-bg: rgba(30, 41, 59, 0.45); --card-border: rgba(255, 255, 255, 0.08); --item-bg: rgba(15, 23, 42, 0.6); --text-primary: #f8fafc; --text-secondary: #94a3b8; --accent: #3b82f6; --success: #10b981; --error: #ef4444; }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Inter', sans-serif; background: radial-gradient(circle at top right, #1e1b4b, var(--bg-main) 40%); color: var(--text-primary); min-height: 100vh; display: flex; justify-content: center; align-items: center; padding: 20px; }
    .dashboard { width: 100%; max-width: 500px; background: var(--card-bg); backdrop-filter: blur(16px); border: 1px solid var(--card-border); border-radius: 24px; padding: 32px; box-shadow: 0 25px 50px rgba(0,0,0,0.6); }
    .header { text-align: center; margin-bottom: 24px; }
    .header h1 { font-size: 26px; font-weight: 700; background: linear-gradient(135deg, #60a5fa, #a855f7); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    .uptime { font-size: 13px; color: var(--accent); font-weight: 500; margin-top: 8px; }
    .node-list { display: flex; flex-direction: column; gap: 14px; }
    .node-card { background: var(--item-bg); border: 1px solid var(--card-border); border-radius: 16px; padding: 18px 20px; display: flex; justify-content: space-between; align-items: center; cursor: pointer; transition: 0.2s; }
    .node-card:hover { transform: translateY(-2px); border-color: var(--accent); }
    .status-badge { padding: 4px 10px; border-radius: 20px; font-size: 11px; font-weight: bold; }
    .online { color: var(--success); } .offline { color: var(--error); }
    .modal-overlay { position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.7); display:flex; justify-content:center; align-items:center; opacity:0; visibility:hidden; transition:0.3s; }
    .modal-overlay.active { opacity:1; visibility:visible; }
    .modal-box { background:#0f172a; padding:24px; border-radius:20px; width:90%; max-width:400px; }
    .config-box { background:#020617; padding:12px; font-family:monospace; font-size:12px; color:#a5b4fc; word-break:break-all; border-radius:8px; margin:15px 0; max-height:100px; overflow-y:auto; }
  </style>
</head>
<body>

  <div class="dashboard">
    <div class="header">
      <h1>Xray Node Status</h1>
      <div class="uptime" id="uptime">Uptime: 00:00:00</div>
    </div>
    <div class="node-list" id="server-container"></div>
    <div class="footer" style="text-align:center; margin-top:20px; font-size:12px; color:#666;" id="time-footer">Syncing...</div>
  </div>

  <div class="modal-overlay" id="configModal">
    <div class="modal-box">
      <div id="modalTitle" style="font-weight:600">Nama Server</div>
      <div class="config-box" id="configText"></div>
      <button style="width:100%; padding:10px; border-radius:8px; border:none; background:#3b82f6; color:#fff; cursor:pointer" onclick="copyConfig()">Salin Link VLESS</button>
    </div>
  </div>

  <script>
    const servers = [
      { id: "jp", name: "🇯🇵 Worker VPN JP", url: "https://vpn.foza.biz.id", vless: "vless://673d0bcb-a575-4a91-825c-f3252f8c7e3b@104.18.95.0:2083/?type=ws&security=tls&encryption=none&host=vpn.foza.biz.id&path=%2F#Worker%20VPN%20JP" },
      { id: "id", name: "🇮🇩 PT Pusat Media Indonesia", url: "https://xray.foza.biz.id", vless: "vless://fc60147e-76b8-4bc5-b691-90b2da79e3d2@104.18.2.1:80/?type=ws&encryption=none&host=xray.foza.biz.id&path=%2F103.6.207.108-8080#PT%20Pusat%20Media%20Indonesia" }
    ];

    // Uptime Logic
    const startTime = Date.now();
    function updateUptime() {
      const diff = new Date(Date.now() - startTime);
      document.getElementById('uptime').innerText = `Uptime: ${String(diff.getUTCHours()).padStart(2,'0')}:${String(diff.getUTCMinutes()).padStart(2,'0')}:${String(diff.getUTCSeconds()).padStart(2,'0')}`;
    }
    setInterval(updateUptime, 1000);

    // Render & Ping Logic
    const container = document.getElementById('server-container');
    servers.forEach((s, i) => {
      container.innerHTML += `<div class="node-card" onclick="openModal(${i})">
        <div><strong>${s.name}</strong><div id="ping-${s.id}" style="font-size:12px; color:#888">Checking...</div></div>
        <div class="status-badge" id="badge-${s.id}">...</div>
      </div>`;
    });

    async function check() {
      for (const s of servers) {
        const start = Date.now();
        try { await fetch(s.url, { mode: 'no-cors' }); updateUI(s.id, true, Date.now() - start); }
        catch { updateUI(s.id, false); }
      }
      document.getElementById('time-footer').innerText = "Last sync: " + new Date().toLocaleTimeString();
    }

    function updateUI(id, up, ping) {
      const b = document.getElementById('badge-'+id), p = document.getElementById('ping-'+id);
      b.className = "status-badge " + (up ? "online" : "offline");
      b.innerText = up ? "ONLINE" : "OFFLINE";
      p.innerText = up ? ping + " ms" : "RTO";
    }

    function openModal(i) {
      document.getElementById('modalTitle').innerText = servers[i].name;
      document.getElementById('configText').innerText = servers[i].vless;
      window.currentConfig = servers[i].vless;
      document.getElementById('configModal').classList.add('active');
    }

    function closeModal() { document.getElementById('configModal').classList.remove('active'); }

    function copyConfig() {
      const t = document.createElement("textarea"); t.value = window.currentConfig;
      document.body.appendChild(t); t.select(); document.execCommand('copy'); document.body.removeChild(t);
      alert("Berhasil disalin!"); closeModal();
    }
    
    document.getElementById('configModal').onclick = (e) => { if(e.target.id==='configModal') closeModal(); };
    check(); setInterval(check, 4000);
  </script>
</body>
</html>
